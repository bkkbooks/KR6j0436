body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯歸命聖主宰普賢金剛手為降伏一切現吽迦囉身摧三世有毒令即證菩提是甚深祕密降三世瑜伽首依真實王禮淨合縛摧入閉普賢印按心稱本誓悅已又誦此摩訶拘嚕二合馱薩怛嚩二合無保反唅發言身即同降三世金剛四印加寶灌鬘甲二擬繫拍掌同金剛即入三摩地諦觀心阿字成月或日輪中生五智杵次請尊及佛入加三昧身又以本教中四印加已滿五寶鬘甲拍陳內外供養讚詠已念誦若作圓具法以五相成身又普悅本誓忿四印五佛寶鬘甲拍等以吽迦囉印加心誦真言吽薩怛嚩二合𮧬日哩二合惹嚩二合羅麼羅拘嚕二合馱吽發吒半聲阿地底瑟咤二合娑嚩二合𤚥次寶二風寶餘准此法以火如蓮業建火逼風額喉頂四印五佛大日用真實教王中金剛界自在誦此祕密言唵嚩日囉二合惹嚩二合攞鉢囉二合跛多二合羯灑也薩嚩怛他蘖多摩賀嚩日囉二合三麼耶吽四佛同四印金剛佛真言吽薩怛嚩二合𮧬日哩二合惹嚩二合邏末羅拘嚕二合馱吽引發吒半音阿鼻詵去左𤚥寶用金剛寶餘三准此鬘甲印准前鬘真言曰唵𮧬日囉二合莽㘑儞哩二合茶去被甲誦此明唵𮧬日囉二合𠸪乞叉三合儞哩二合茶去四攝八供養同金剛界儀唯現於擬叱鉤真言曰唵𮧬日𠻴二合句捨麼賀句嚕二合馱羯灑耶沙去莽鹽引吽惹入索真言曰唵𮧬日囉二合跛捨麼賀句嚕二合馱羯灑耶娑去莽鹽吽吽鎖真言曰唵𮧬日囉二合寒普二合吒麼賀句嚕二合馱羯灑耶娑去莽鹽鑁鈴真言唵𮧬日囉二合吠捨麼賀句嚕二合馱羯灑耶娑去莾鹽斛嬉戲真言曰唵𮧬日囉二合攞細麼賀句嚕二合馱羯灑耶娑去莽鹽斛又前觀智身自心流婀字面前成月輪即出生金剛五峯流猛焰生三悅我是又丈於世尊即召滿空佛入金剛鎖悅又稱明顯言金剛即變成吽迦囉金剛暴怒處月輪身流火光聚遍體玄青色大自在天王妃烏摩為座歷然分明見即四印加持又示羯摩印滿月已五灌寶鬘甲拍等施內外供養自住薩埵身扭擲金剛杵震動大千界誦百八名讚都請諸聖賢鉤召索引入鎖止鈴悅喜四明召智身入自體無二又四加示誓滿月已五灌寶鬘甲拍已又陳內外供即起平身立舉右足左旋攝彼傲慢者大自在欲王撲至於地已定按於彼頂慧踐彼王妃烏摩乳房上摧彼我慢故以足加於頂被害殞此已灰嚴界成佛住是三昧時極力頻身踏或身掉出污當知尊攝受定慧金剛拳二地結風背循身觀相好歷然見如前旋時誦足鉤真言曰唵引迦引那引羯哩灑二合庾嚩日囉二合吽短步踏時真言曰唵引嚩日囉二合引麼半吽短又見自心月金剛具五峯中有所持明流射金剛火住是大三昧持根本真言或心一字明或業心中心擲枳王真言住定疲極已方坐誦讚歎陳供及發願即作解脫法以本法四印四處掣開之心上真言曰唵引薩怛嚩二合嚩日囉二合惹嚩二合羅麼引羅矩嚕二合引馱吽短發吒半音目又以真實王四印掣開之心上真言曰唵引薩怛嚩二合嚩日哩二合吽短聖衆還宮已即寶鬘甲拍護此常恆身四禮五向等餘皆同諸教降三世瑜伽二羽印當心慧手持五鈷努臂如下擬次箭劍直執定上五鈷鉤次弓次執索皆直引臂持四面正青色右黃左緑色後紅咸忿怒自在天王妃為座如前說吽迦囉金剛作如是相好
